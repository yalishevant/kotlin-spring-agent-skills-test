spring:
  datasource:
    url: jdbc:h2:mem:orderfallout;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple
  jackson:
    default-property-inclusion: non_null
